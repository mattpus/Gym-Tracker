name: GymTracker
options:
  bundleIdPrefix: com.gymtracker
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

packages:
  GymTracker:
    path: .

targets:
  GymTracker:
    type: application
    platform: iOS
    sources:
      - path: App
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.gymtracker.app
        PRODUCT_NAME: Gym Tracker
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: "YES"
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: GymTracker
        product: WorkoutsDomain
      - package: GymTracker
        product: WorkoutsData
      - package: GymTracker
        product: WorkoutsPresentation
      - package: GymTracker
        product: ExerciseLibraryDomain
      - package: GymTracker
        product: ExerciseLibraryData
      - package: GymTracker
        product: AnalyticsDomain
      - package: GymTracker
        product: AnalyticsData
      - package: GymTracker
        product: AnalyticsPresentation
      - package: GymTracker
        product: ProgressionDomain
      - package: GymTracker
        product: ProgressionData

  GymTrackerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/AppTests
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gymtracker.app.tests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Gym Tracker.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Gym Tracker"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: GymTracker
      - package: GymTracker
        product: ExerciseLibraryDomain
      - package: GymTracker
        product: WorkoutsDomain

  GymTrackerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/GymTrackerUITests
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gymtracker.app.uitests
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: GymTracker

schemes:
  GymTracker:
    build:
      targets:
        GymTracker: all
        GymTrackerTests: [test]
        GymTrackerUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - GymTrackerTests
        - GymTrackerUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
