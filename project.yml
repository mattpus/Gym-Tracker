name: GymTracker
options:
  minimumXcodeGenVersion: 2.39.0
  deploymentTarget:
    iOS: 17.0
configs:
  Debug: debug
  Release: release
settings:
  base:
    PRODUCT_NAME: GymTracker
    SWIFT_VERSION: 5.10
    DEVELOPMENT_TEAM: ""
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: NO
packages:
  GymTrackerPackage:
    path: .
targets:
  GymTrackerApp:
    type: application
    platform: iOS
    deploymentTarget: 17.0
    sources:
      - path: App
        excludes:
          - "**/.DS_Store"
          - "Info.plist"
    resources:
      - App/Assets.xcassets
    info:
      path: App/Info.plist
    dependencies:
      - package: GymTrackerPackage
        product: WorkoutsDomain
      - package: GymTrackerPackage
        product: WorkoutsData
      - package: GymTrackerPackage
        product: ExerciseLibraryDomain
      - package: GymTrackerPackage
        product: ExerciseLibraryData
      - package: GymTrackerPackage
        product: AnalyticsDomain
      - package: GymTrackerPackage
        product: AnalyticsData
      - package: GymTrackerPackage
        product: ProgressionDomain
      - package: GymTrackerPackage
        product: ProgressionData
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.openclaw.gymtracker
        INFOPLIST_FILE: App/Info.plist
        TARGETED_DEVICE_FAMILY: 1,2
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
  GymTrackerUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: 17.0
    sources:
      - Tests/GymTrackerUITests
    dependencies:
      - target: GymTrackerApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.openclaw.gymtracker.uitests
        TEST_TARGET_NAME: GymTrackerApp
schemes:
  GymTrackerApp:
    build:
      targets:
        GymTrackerApp: all
        GymTrackerUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: false
      targets:
        - name: GymTrackerUITests
